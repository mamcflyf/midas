name: Update RoscomVPN Routing

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  update-routing:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download and update routing file
        run: |
          curl -s https://raw.githubusercontent.com/hydraponique/roscomvpn-routing/main/HAPP/JSONSUB.JSON -o /tmp/jsonsub.json
          sed -i 's/"Name": "RoscomVPN JSON"/"Name": "Midas-RU-JSON-routing"/g' /tmp/jsonsub.json
          mkdir -p routing/happ routing/incy
          cp /tmp/jsonsub.json routing/happ/default.json
          cp /tmp/jsonsub.json routing/incy/default.json
      
      - name: Create deeplink files for happ
        run: |
          JSON_CONTENT=$(cat routing/happ/default.json)
          BASE64_ENCODED=$(echo -n "$JSON_CONTENT" | base64 -w 0)
          echo "happ://routing/onadd/$BASE64_ENCODED" > routing/happ/deeplink.json
      
      - name: Create deeplink files for incy
        run: |
          JSON_CONTENT=$(cat routing/incy/default.json)
          BASE64_ENCODED=$(echo -n "$JSON_CONTENT" | base64 -w 0)
          echo "incy://routing/onadd/$BASE64_ENCODED" > routing/incy/deeplink.json
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add routing/happ/default.json routing/happ/deeplink.json routing/incy/default.json routing/incy/deeplink.json
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update RoscomVPN routing configuration"
            git push
          fi
