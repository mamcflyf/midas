name: Update RoscomVPN Routing

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  update-routing:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download and update routing file
        run: |
          curl -s https://raw.githubusercontent.com/hydraponique/roscomvpn-routing/main/HAPP/JSONSUB.JSON -o /tmp/jsonsub.json
          sed -i 's/"Name": "RoscomVPN JSON"/"Name": "Midas-RU-JSON-routing"/g' /tmp/jsonsub.json
          mkdir -p routing/happ
          cp /tmp/jsonsub.json routing/happ/default.json
      
      - name: Create deeplink files
        run: |
          JSON_CONTENT=$(cat routing/happ/default.json)
          DEEPLINK_PREFIX="happ://routing/onadd/"
          FULL_STRING="${DEEPLINK_PREFIX}${JSON_CONTENT}"
          
          # 1. deeplink.json - обычный текст с префиксом
          echo "$FULL_STRING" > routing/happ/deeplink.json
          
          # 2. deeplink-base64.json - только base64 без обёрток
          BASE64_ENCODED=$(echo -n "$FULL_STRING" | base64 -w 0)
          echo "$BASE64_ENCODED" > routing/happ/deeplink-base64.json
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add routing/happ/default.json routing/happ/deeplink.json routing/happ/deeplink-base64.json
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update RoscomVPN routing configuration"
            git push
          fi
