name: Sync whitelist

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug filesystem
        run: |
          echo "=== ROOT ==="
          ls -la
          echo "=== TREE ==="
          find . -maxdepth 2 -type f

      - name: Validate header
        run: |
          if [ ! -f header ]; then
            echo "ERROR: header not found"
            exit 1
          fi

      - name: Download external file
        run: |
          echo "Downloading..."
          curl -fsSL https://raw.githubusercontent.com/zieng2/wl/main/vless_lite.txt -o external.txt || {
            echo "Download failed"
            exit 1
          }

          if [ ! -s external.txt ]; then
            echo "Downloaded file is empty"
            exit 1
          fi

      - name: Merge with metadata
        run: |
          COUNT=$(grep -cve '^\s*$' external.txt)
          DATE=$(date -u "+%Y-%m-%d %H:%M:%S")

          {
            cat header
            echo "#auto-selected-at: $DATE"
            echo "#servers-count: $COUNT"
            echo ""
            cat external.txt
          } > combined.txt

          echo "=== PREVIEW ==="
          head -n 15 combined.txt

      - name: Update file if changed
        run: |
          if [ ! -f wl ]; then
            echo "First run: creating file"
            mv combined.txt wl
            echo "changed=true" >> $GITHUB_ENV
            exit 0
          fi

          if cmp -s combined.txt wl; then
            echo "No changes"
            rm combined.txt
          else
            echo "File updated"
            mv combined.txt wl
            echo "changed=true" >> $GITHUB_ENV
          fi

      - name: Commit changes
        if: env.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add wl
          git commit -m "auto: update merged list"
          git push
